server {
    listen 80;
    listen [::]:80;

    server_name test-api.astir-animation.uz;

    # Large media uploads. The multi-audio streaming upload sends the video plus
    # up to three audio tracks and subtitles in a SINGLE multipart request, so
    # this cap must exceed the combined size of every file, not just the video.
    # Keep this in sync with MAX_VIDEO_UPLOAD_MB (per-file cap in the Node app).
    client_max_body_size 16384M;   # 16 GB total request body
    client_body_timeout 600s;      # allow slow, large uploads to keep streaming

    location / {
        proxy_pass http://127.0.0.1:2048;
        proxy_http_version 1.1;

        # Stream large uploads straight to the app instead of buffering the whole
        # multi-GB body to nginx's disk first (faster, less disk, avoids timeouts).
        proxy_request_buffering off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # When nginx itself rejects an oversized upload it never reaches the Node
    # app, so the app's CORS middleware never runs and the browser reports the
    # 413 as an opaque "No Access-Control-Allow-Origin" CORS error. Re-attach the
    # CORS header on this specific error path so the dashboard sees a real 413.
    # (Only fires on 413, so it never duplicates the header on proxied 2xx/4xx.)
    error_page 413 = @payload_too_large;
    location @payload_too_large {
        add_header 'Access-Control-Allow-Origin' $http_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET,HEAD,PUT,PATCH,POST,DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'authorization,content-type' always;
        return 413;
    }
}

# IMPORTANT: production serves this host over HTTPS (443). The certbot-managed
# `listen 443 ssl` server block is the one that actually handles dashboard
# traffic, and it must carry the SAME `client_max_body_size 16384M;`,
# `client_body_timeout 600s;`, and the 413 error_page block above. nginx's
# default cap is 1 MB and certbot does not copy custom directives into the 443
# block, so verify the live SSL vhost after any certbot run.
